# Split-DNS für die Fernzugriffs-Schiene.
# WICHTIG: <DEINE-DOMAIN> durch deine echte DuckDNS-Domain ersetzen,
# z.B.  address=/meinring.duckdns.org/10.8.0.1
#
# Damit löst dein Handy im Tunnel die Domain auf den WireGuard-Server (10.8.0.1)
# auf → Caddy dort liefert das Dashboard mit gültigem HTTPS-Zertifikat aus.
address=/<DEINE-DOMAIN>/10.8.0.1

# Alles andere normal nach draußen auflösen:
no-resolv
server=1.1.1.1
server=8.8.8.8
