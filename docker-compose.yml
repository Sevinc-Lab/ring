# Local, event-driven NVR for a Ring battery camera — CasaOS / Docker.
# M1: ring-worker only. M3 will add a read-only ring-dashboard service.
#
# Volumes live on the SATA disk under /DATA/ring (CasaOS convention). Adjust the
# host paths on the left if your disk is mounted elsewhere — see docs/SETUP.md.

services:
  ring-worker:
    build: ./packages/worker
    image: sevinc-lab/ring-worker:0.1.0
    container_name: ring-worker
    env_file: .env
    volumes:
      - /DATA/ring/media:/data/media     # rw: mp4 + thumbnails (M2)
      - /DATA/ring/db:/data/db           # rw: sqlite + heartbeat
      - /DATA/ring/secrets:/data/secrets # rw: rotated refresh token (0600)
    restart: unless-stopped

  # M3: local LAN dashboard — event timeline + clip playback. Reads the index
  # with a read-only DB *connection*; the db volume is mounted read-write so
  # SQLite's WAL shared-memory works across both containers (the connection
  # still cannot write a row). Media is mounted read-only.
  ring-dashboard:
    build: ./packages/dashboard
    image: sevinc-lab/ring-dashboard:0.1.0
    container_name: ring-dashboard
    environment:
      - DATA_DB_PATH=/data/db/ring.db
      - DATA_MEDIA_DIR=/data/media
      - TZ=Europe/Berlin
    volumes:
      - /DATA/ring/media:/data/media:ro  # ro: serve clips + thumbnails
      - /DATA/ring/db:/data/db           # rw mount, read-only connection (WAL shm)
    ports:
      - "8080:8080"
    restart: unless-stopped

  # M4a: post-hoc person detection. Polls recorded+unclassified clips, samples
  # frames across the whole clip, runs YOLOv8n (CPU), writes ONLY label/label_meta.
  # Fully decoupled — if this is down, the worker keeps recording. Never deletes.
  ring-detector:
    build: ./packages/detector
    image: sevinc-lab/ring-detector:0.1.0
    container_name: ring-detector
    environment:
      - DATA_DB_PATH=/data/db/ring.db
      - DATA_MEDIA_DIR=/data/media
      - POLL_SECONDS=5
      - FRAMES_PER_CLIP=5
      - MIN_CONFIDENCE=0.40
      - DETECT_CLASSES=person,dog,cat   # order = label priority; 'parcel' needs a custom model (M4d)
      - NOTIFY_LABELS=person            # which labels ping Telegram (dog/cat only labeled, not notified)
      # M4c notifications: stays a no-op until N8N_WEBHOOK_URL is set (then it
      # POSTs the payload on a notify-label detection). See docs/M4c-SETUP-telegram.md.
      - NOTIFY_ENABLED=true
      - N8N_WEBHOOK_URL=           # paste your n8n webhook Production URL here
      - DASHBOARD_BASE_URL=        # e.g. http://192.168.1.50:8080 (for links/thumbnail)
      - TZ=Europe/Berlin
    volumes:
      - /DATA/ring/media:/data/media:ro  # ro: read clips
      - /DATA/ring/db:/data/db           # rw: writes ONLY label/label_meta
    restart: unless-stopped
